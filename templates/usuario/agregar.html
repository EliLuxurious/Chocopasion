{% extends "base.html" %}
{% block title %}Nuevo Usuario — Chocopasión{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Nuevo Usuario</h1>
        <p class="text-gray-500 mt-0.5">Crea una nueva cuenta de acceso al sistema</p>
    </div>
    <a href="{{ url_for('usuarios_index') }}"
       class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold
              text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 transition-colors">
        <i class="fas fa-arrow-left text-xs"></i> Volver
    </a>
</div>

<div class="bg-white rounded-2xl border border-chocolate-100 shadow-card max-w-2xl">
    <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="font-semibold text-gray-800 text-sm flex items-center gap-2">
            <i class="fas fa-user-plus text-chocolate-500"></i> Datos del Usuario
        </h2>
    </div>
    <form method="POST" action="{{ url_for('usuarios_agregar') }}" class="p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
                <label for="nombre" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Nombre <span class="text-red-400">*</span>
                </label>
                <input type="text" id="nombre" name="nombre" required placeholder="Juan"
                       class="w-full px-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                              focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
            </div>
            <div>
                <label for="apellido" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Apellido <span class="text-red-400">*</span>
                </label>
                <input type="text" id="apellido" name="apellido" required placeholder="Pérez"
                       class="w-full px-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                              focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
            </div>
            <div class="sm:col-span-2">
                <label for="email" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Email <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-envelope text-chocolate-400 text-sm"></i>
                    </div>
                    <input type="email" id="email" name="email" required placeholder="usuario@chocopasion.com"
                           class="w-full pl-10 pr-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                                  focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
                </div>
            </div>
            <div>
                <label for="password" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Contraseña <span class="text-red-400">*</span>
                </label>
                <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-3.5 flex items-center pointer-events-none">
                        <i class="fas fa-lock text-chocolate-400 text-sm"></i>
                    </div>
                    <input type="password" id="password" name="password" required placeholder="••••••••"
                           class="w-full pl-10 pr-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                                  focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
                </div>
            </div>
            <div>
                <label for="rol" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Rol <span class="text-red-400">*</span>
                </label>
                <select id="rol" name="rol" required
                        class="w-full px-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                               focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
                    <option value="empleado">Empleado</option>
                    <option value="administrador">Administrador</option>
                </select>
            </div>
        </div>
        <div class="flex items-center justify-end gap-3 mt-6 pt-5 border-t border-gray-100">
            <a href="{{ url_for('usuarios_index') }}"
               class="px-5 py-2.5 rounded-xl text-sm font-semibold text-gray-600 bg-gray-100 hover:bg-gray-200 transition-colors">
                Cancelar
            </a>
            <button type="submit"
                    class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-chocolate-700 hover:bg-chocolate-800
                           transition-colors flex items-center gap-2 shadow-lg shadow-chocolate-900/20">
                <i class="fas fa-save"></i> Guardar Usuario
            </button>
        </div>
    </form>
</div>
{% endblock %}
