{% extends 'base.html' %}
{% block title %}Agregar Producción{% endblock %}
{% block content %}
<div class="row">
    <div class="col-md-8 offset-md-2">
        <h1 class="mb-4">Agregar Producción</h1>
        
        <form method="POST" class="needs-validation" novalidate>
            <div class="mb-3">
                <label for="fecha" class="form-label">Fecha:</label>
                <input type="date" class="form-control" id="fecha" name="fecha" required>
            </div>
            
            <div class="mb-3">
                <label for="codigo" class="form-label">Código:</label>
                <input type="text" class="form-control" id="codigo" name="codigo" required>
            </div>
            
            <div class="mb-3">
                <label for="producto" class="form-label">Producto:</label>
                <input type="text" class="form-control" id="producto" name="producto" required>
            </div>
            
            <div class="mb-3">
                <label for="presentacion" class="form-label">Presentación:</label>
                <input type="text" class="form-control" id="presentacion" name="presentacion" required>
            </div>
            
            <div class="mb-3">
                <label for="cantidad" class="form-label">Cantidad:</label>
                <input type="number" class="form-control" id="cantidad" name="cantidad" required>
            </div>
            
            <div class="mb-3">
                <label for="unidad" class="form-label">Unidad:</label>
                <input type="text" class="form-control" id="unidad" name="unidad" required>
            </div>
            
            <div class="mb-3">
                <label for="responsables" class="form-label">Responsables:</label>
                <input type="text" class="form-control" id="responsables" name="responsables" required>
            </div>
            
            <div class="d-flex gap-2">
                <button type="submit" class="btn btn-primary">Guardar</button>
                <a href="{{ url_for('produccion.index') }}" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
