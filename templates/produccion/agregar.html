{% extends "base.html" %}

{% block title %}Agregar Producción - Chocopasión{% endblock %}

{% block content %}
<div class="container-fluid">
    <div class="row mb-4">
        <div class="col-12">
            <div class="d-flex justify-content-between align-items-center">
                <div>
                    <h1 class="h3 mb-2">Nuevo Registro de Producción</h1>
                    <p class="text-muted">Complete el formulario para registrar una nueva producción</p>
                </div>
                <a href="{{ url_for('produccion_index') }}" class="btn btn-outline-secondary">
                    <i class="fas fa-arrow-left me-2"></i>Volver
                </a>
            </div>
        </div>
    </div>

    <div class="row">
        <div class="col-12">
            <div class="card border-0 shadow-sm">
                <div class="card-body">
                    <form action="{{ url_for('produccion_agregar') }}" method="POST">
                        <div class="row g-4">
                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="date" class="form-control" id="fecha" name="fecha" required>
                                    <label for="fecha">Fecha de Producción</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <select class="form-select" id="producto" name="producto" required>
                                        <option value="">Seleccione un producto</option>
                                        {% for producto in productos %}
                                        <option value="{{ producto.id_producto }}">{{ producto.nombre }}</option>
                                        {% endfor %}
                                    </select>
                                    <label for="producto">Producto</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <select class="form-select" id="presentacion" name="presentacion" required>
                                        <option value="">Seleccione una presentación</option>
                                        {% for presentacion in presentaciones %}
                                        <option value="{{ presentacion.id_presentacion }}">{{ presentacion.descripcion }}</option>
                                        {% endfor %}
                                    </select>
                                    <label for="presentacion">Presentación</label>
                                </div>
                            </div>

                            <div class="col-md-6">
                                <div class="form-floating mb-3">
                                    <input type="number" class="form-control" id="cantidad" name="cantidad" required min="1">
                                    <label for="cantidad">Cantidad</label>
                                </div>
                            </div>

                            <div class="col-12">
                                <div class="card border-0 bg-light">
                                    <div class="card-body">
                                        <h5 class="card-title mb-3">Responsables</h5>
                                        <div id="responsables-container">
                                            <div class="row g-3 mb-3">
                                                <div class="col-md-11">
                                                    <div class="form-floating">
                                                        <select class="form-select responsable-select" name="id_responsable" required>
                                                            <option value="">Seleccione un responsable</option>
                                                            {% for responsable in responsables %}
                                                            <option value="{{ responsable.id_responsable }}">{{ responsable.nombre }} {{ responsable.apellido }}</option>
                                                            {% endfor %}
                                                        </select>
                                                        <label>Responsable</label>
                                                    </div>
                                                </div>
                                                <div class="col-md-1 d-flex align-items-center">
                                                    <button type="button" class="btn btn-danger remove-responsable" style="display: none;">
                                                        <i class="fas fa-times"></i>
                                                    </button>
                                                </div>
                                            </div>
                                        </div>
                                        <button type="button" class="btn btn-outline-primary" id="agregar-responsable">
                                            <i class="fas fa-plus me-2"></i>Agregar Responsable
                                        </button>
                                    </div>
                                </div>
                            </div>

                            <div class="col-12">
                                <hr class="my-4">
                                <div class="d-flex justify-content-end gap-2">
                                    <a href="{{ url_for('produccion_index') }}" class="btn btn-light">Cancelar</a>
                                    <button type="submit" class="btn btn-primary">
                                        <i class="fas fa-save me-2"></i>Guardar Producción
                                    </button>
                                </div>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.addEventListener('DOMContentLoaded', function() {
    const container = document.getElementById('responsables-container');
    const addButton = document.getElementById('agregar-responsable');
    
    // Función para crear un nuevo campo de responsable
    function createResponsableField() {
        const div = document.createElement('div');
        div.className = 'row g-3 mb-3';
        div.innerHTML = `
            <div class="col-md-11">
                <div class="form-floating">
                    <select class="form-select responsable-select" name="responsables[]" required>
                        <option value="">Seleccione un responsable</option>
                        {% for responsable in responsables %}
                        <option value="{{ responsable.id_usuario }}">{{ responsable.nombre }} {{ responsable.apellido }}</option>
                        {% endfor %}
                    </select>
                    <label>Responsable</label>
                </div>
            </div>
            <div class="col-md-1 d-flex align-items-center">
                <button type="button" class="btn btn-danger remove-responsable">
                    <i class="fas fa-times"></i>
                </button>
            </div>
        `;
        return div;
    }

    // Mostrar botón de eliminar en el primer campo cuando hay más de uno
    function updateRemoveButtons() {
        const fields = container.querySelectorAll('.row');
        fields.forEach((field, index) => {
            const removeButton = field.querySelector('.remove-responsable');
            if (fields.length > 1) {
                removeButton.style.display = 'block';
            } else {
                removeButton.style.display = 'none';
            }
        });
    }

    // Agregar nuevo responsable
    addButton.addEventListener('click', function() {
        container.appendChild(createResponsableField());
        updateRemoveButtons();
    });

    // Eliminar responsable
    container.addEventListener('click', function(e) {
        if (e.target.closest('.remove-responsable')) {
            const field = e.target.closest('.row');
            if (container.children.length > 1) {
                field.remove();
                updateRemoveButtons();
            }
        }
    });
});
</script>
{% endblock %}
