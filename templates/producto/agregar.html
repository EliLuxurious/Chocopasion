{% extends "base.html" %}
{% block title %}Agregar Producto — Chocopasión{% endblock %}

{% block content %}
<div class="flex items-center justify-between mb-8">
    <div>
        <h1 class="text-2xl font-bold text-gray-900">Agregar Producto</h1>
        <p class="text-gray-500 mt-0.5">Complete el formulario para agregar un nuevo producto</p>
    </div>
    <a href="{{ url_for('productos_index') }}"
       class="inline-flex items-center gap-2 px-4 py-2 rounded-xl text-sm font-semibold
              text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 transition-colors">
        <i class="fas fa-arrow-left text-xs"></i> Volver
    </a>
</div>

<div class="bg-white rounded-2xl border border-chocolate-100 shadow-card max-w-2xl">
    <div class="px-6 py-4 border-b border-gray-100">
        <h2 class="font-semibold text-gray-800 text-sm flex items-center gap-2">
            <i class="fas fa-box text-chocolate-500"></i> Datos del Producto
        </h2>
    </div>
    <form action="{{ url_for('productos_agregar') }}" method="POST" class="p-6">
        <div class="grid grid-cols-1 sm:grid-cols-2 gap-5">
            <div>
                <label for="nombre" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">
                    Nombre <span class="text-red-400">*</span>
                </label>
                <input type="text" id="nombre" name="nombre" required placeholder="Chocolate negro 70%"
                       class="w-full px-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                              focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
            </div>
            <div>
                <label for="codigo" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Código</label>
                <input type="text" id="codigo" name="codigo" placeholder="CHO-001"
                       class="w-full px-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                              focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all">
            </div>
            <div class="sm:col-span-2">
                <label for="descripcion" class="block text-xs font-semibold text-gray-500 uppercase tracking-wider mb-1.5">Descripción</label>
                <textarea id="descripcion" name="descripcion" rows="4" placeholder="Descripción detallada del producto..."
                          class="w-full px-3 py-2.5 bg-chocolate-50 border border-gray-200 rounded-xl text-sm text-gray-800
                                 focus:outline-none focus:ring-2 focus:ring-chocolate-400 focus:border-transparent transition-all resize-none"></textarea>
            </div>
        </div>
        <div class="flex justify-end mt-6 pt-5 border-t border-gray-100">
            <button type="submit"
                    class="px-5 py-2.5 rounded-xl text-sm font-semibold text-white bg-chocolate-700 hover:bg-chocolate-800
                           transition-colors flex items-center gap-2 shadow-lg shadow-chocolate-900/20">
                <i class="fas fa-save"></i> Guardar Producto
            </button>
        </div>
    </form>
</div>
{% endblock %}
