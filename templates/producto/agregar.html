<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agregar Producto</title>
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/estilos.css') }}">
</head>
<body>
    <!-- Sidebar -->
    <div class="sidebar">
        <div class="logo">
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="ChocoPassion">
            <h3>ChocoPassion</h3>
        </div>
        <nav class="nav flex-column">
            <a class="nav-link" href="{{ url_for('index') }}">
                <i class="fas fa-chart-pie"></i>
                <span>Dashboard</span>
            </a>
            <a class="nav-link active" href="{{ url_for('productos_index') }}">
                <i class="fas fa-box"></i>
                <span>Productos</span>
            </a>
            <a class="nav-link" href="{{ url_for('produccion_index') }}">
                <i class="fas fa-industry"></i>
                <span>Producción</span>
            </a>
            <a class="nav-link" href="{{ url_for('usuarios_index') }}">
                <i class="fas fa-users"></i>
                <span>Usuarios</span>
            </a>
        </nav>
    </div>

    <!-- Main Content -->
    <div class="main-content">
        <div class="welcome-header">
            <h1>Agregar Producto</h1>
            <p class="text-muted">Completa el formulario para agregar un nuevo producto al sistema.</p>
        </div>

        <!-- Formulario -->
        <div class="card">
            <div class="card-body">
                <form method="POST">
                    <div class="mb-3">
                        <label for="codigo" class="form-label">Código:</label>
                        <input type="text" id="codigo" name="codigo" class="form-control" required>
                    </div>
                    <div class="mb-3">
                        <label for="nombre" class="form-label">Nombre:</label>
                        <input type="text" id="nombre" name="nombre" class="form-control" required>
                    </div>
                    <button type="submit" class="btn btn-primary">Agregar Producto</button>
                </form>
            </div>
        </div>
        <a href="{{ url_for('productos_index') }}" class="btn btn-secondary mt-3">Volver a la Lista de Productos</a>
    </div>

    <!-- Bootstrap bundle with Popper -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
